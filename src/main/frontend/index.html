<!DOCTYPE html>
<html lang="en">

  <!-- Kiss demo application.  See https://kissweb.org -->

<head>
    <title>Kiss Application</title>
    <meta charset="UTF-8">

    <!--
        Content-Security-Policy is delivered as an HTTP response header by
        SecurityHeadersFilter (org.kissweb.restServer), NOT here.  The Report-Only
        form used during rollout is invalid in a <meta> tag (browsers ignore it),
        and a header is also the single source of truth for production/Electron.
        Validate the policy by browsing the app via the Tomcat origin
        (http://localhost:8080); the dev static server on :8000 cannot set headers.
    -->

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="normalize.css?nocache=20230813">
    <link rel="stylesheet" href="normalize2.css?nocache=20230813">

    <link rel="stylesheet" href="kiss/Utils.css?nocache=20230813">
    <link rel="stylesheet" href="kiss/ag-grid-custom.css?nocache=20250711">

    <style>

        .ck-powered-by {
            display: none;
        }

        html, body {
            width: 100%;
            box-sizing: border-box;
            background-color: #b7e4ff;
        }

        label {
            margin-top: 3px;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
        }

        input[type=button], input[type=checkbox], input[type=radio], select {
            cursor: pointer;
        }

    </style>

    <!-- Per-deployment configuration, then the framework bootstrap loader.
         Externalized from an inline <script> so the page runs under a strict CSP. -->
    <script src="SystemInfo.js"></script>
    <script src="kiss/bootstrap.js"></script>

</head>

<body>

<script src="lib/ag-grid-community.min.noStyle.js?nocache=20250711"></script>
<script src="lib/ckeditor.js?nocache=20230813"></script>

</body>

</html>
