
[main]

DatabaseType = SQLite
DatabaseHost = localhost
# DatabasePort = 5432
DatabaseName = DB.sqlite
#DatabaseSchema = public
DatabaseUser = ""
DatabasePassword = ""

# Used to set additional database connection parameters to the connection string
# DatabaseConnectionParameters =

# Max number of simultaneous REST services (any additional are put on a queue)
MaxWorkerThreads = 30

# If a user is inactive for this many seconds, they get auto-logged off
UserInactiveSeconds = 900

# Require authentication even when no SQL database is configured
# Set to true when using an alternative data store for user authentication
# RequireAuthentication = false

# ===== DATABASE CONNECTION POOL SETTINGS =====
# These settings control the C3P0 connection pool behavior
# Uncomment and adjust for production/large applications

# Minimum number of connections to maintain in pool
# DatabaseMinPoolSize = 10

# Initial number of connections when pool starts
# DatabaseInitialPoolSize = 10

# Maximum number of connections allowed in pool
# For large applications: set to (CPU cores * 4) or higher based on load
# DatabaseMaxPoolSize = 100

# Number of connections to acquire when pool needs to grow
# DatabaseAcquireIncrement = 5

# Milliseconds to wait for a connection before timing out
# DatabaseCheckoutTimeout = 10000

# Maximum number of prepared statements to cache (improves performance)
# DatabaseMaxStatements = 500

# Maximum statements to cache per connection
# DatabaseMaxStatementsPerConnection = 25

# Seconds between testing idle connections (0 = disabled)
# DatabaseIdleTestPeriod = 300

# Seconds before removing idle connections (0 = never)
# DatabaseMaxIdleTime = 1800

# Test connections when checking out from pool (impacts performance)
# DatabaseTestOnCheckout = false

# Test connections when returning to pool (recommended)
# DatabaseTestOnCheckin = true

# Number of helper threads for pool management
# DatabaseHelperThreads = 10

# Seconds before forcibly reclaiming unreturned connections
# DatabaseUnreturnedTimeout = 60

# Enable stack traces for debugging unreturned connections (disable in production!)
# DatabaseDebugStackTraces = false

# ===== OAUTH 2.1 RESOURCE-SERVER SETTINGS =====
# These settings let MCP servers (and any other endpoint) validate OAuth 2.1
# bearer tokens (JWTs).  The tokens can be issued either by this same Kiss
# app acting as the authorization server (see the AS section below --- the
# common MCP deployment shape) or by an external authorization server such
# as Auth0, Okta, Keycloak, Microsoft Entra, or Google.
#
# When OAuthAuthorizationServer is set, three things happen automatically:
#   1. Every MCPServerBase subclass starts requiring a valid bearer token on
#      every request (no code change needed in the MCP servlet).
#   2. The /.well-known/oauth-protected-resource discovery endpoint becomes
#      active so MCP clients can bootstrap their auth flow.
#   3. BearerTokenValidator can be called from any other servlet's
#      authenticate() override.
# Leave these commented out to leave the OAuth subsystem inert.

# Issuer URL of the OAuth 2.1 authorization server (required to enable).
# This is the only OAuth setting that must contain a URL --- the other
# URL-bearing keys below default to this value or to discovery against
# it, so for the common single-Kiss-app AS+RS shape this string need
# appear only once in this file.
# OAuthAuthorizationServer = https://myapp.example.com

# Canonical URL of this resource server --- the value tokens must carry
# in the "aud" claim.  Defaults to OAuthAuthorizationServer, which is
# correct when this Kiss app is both the AS and the RS (the common MCP
# shape).  Set this only when the RS is hosted at a URL different from
# the AS.
# OAuthResourceIdentifier = https://myapp.example.com

# Comma- or space-separated scopes every token must carry (optional)
# OAuthRequiredScopes = mcp:read mcp:write

# Explicit JWKS URL.  Optional --- if omitted, the framework discovers
# it from <OAuthAuthorizationServer>/.well-known/oauth-authorization-server
# (RFC 8414, the OAuth 2.1 standard, which Kiss's own AS publishes),
# falling back to <OAuthAuthorizationServer>/.well-known/openid-configuration
# for OIDC-only authorization servers.  Set this only when neither
# metadata document is published.
# OAuthJwksUri = https://myapp.example.com/.well-known/jwks.json

# How long to cache JWKS keys before refetching, in seconds (default 3600)
# OAuthJwksCacheSeconds = 3600

# Comma-separated list of acceptable JWS algorithms (default RS256)
# OAuthAllowedAlgorithms = RS256

# Allowed clock skew when validating exp/nbf, in seconds (default 60)
# OAuthClockSkewSeconds = 60

# ===== OAUTH 2.1 AUTHORIZATION-SERVER SETTINGS =====
# These settings turn this Kiss app into an OAuth 2.1 authorization
# server --- the component that authenticates users, runs the consent
# UI, and issues access + refresh tokens.  When combined with the
# resource-server settings above, a single Kiss app can be both AS and
# RS for its own MCP endpoints (the common MCP deployment shape).
#
# Setting OAuthAsEnabled = true activates the following endpoints
# (all auto-registered via @WebServlet):
#
#   GET  /.well-known/oauth-authorization-server   (RFC 8414 metadata)
#   GET  /oauth/jwks                               (signing keys)
#   GET  /oauth/authorize                          (auth code flow w/ PKCE)
#   POST /oauth/token                              (code exchange + refresh)
#   POST /oauth/register                           (RFC 7591 DCR)
#
# An application MUST also register an org.kissweb.oauth.as.UserAuthenticator
# at startup (typically in KissInit.groovy) for the AS to function ---
# see OAuth.md for the recipe.

# Set to true to enable the AS endpoints (default false)
# OAuthAsEnabled = true

# Canonical issuer URL of this AS.  Defaults to OAuthAuthorizationServer,
# which is correct when this Kiss app is both the AS and the RS.  Set
# this only when the AS publishes itself under a URL different from the
# RS-side OAuthAuthorizationServer value.
# OAuthAsIssuer = https://myapp.example.com

# Path to the persistence file (signing keys, clients, refresh tokens),
# relative to MainServlet.getApplicationPath() --- which is already the
# backend directory.  Default: oauth.ini (colocated with this file).
# OAuthAsIniFile = oauth.ini

# Lifetime of issued access tokens, in seconds.  Default 3600 (1 hour)
# OAuthAccessTokenTtlSeconds = 3600

# Lifetime of issued refresh tokens, in seconds.  Default 2592000 (30 days)
# OAuthRefreshTokenTtlSeconds = 2592000

# Lifetime of authorization codes, in seconds.  Default 60
# OAuthAuthCodeTtlSeconds = 60

# Minimum seconds between automatic prune sweeps of expired tokens.
# Pruning runs opportunistically when an OAuth endpoint is called after
# this interval has elapsed.  Default 900 (15 minutes)
# OAuthPruneIntervalSeconds = 900

# Whether the /oauth/register endpoint is enabled (default true; MCP requires it)
# OAuthAllowDynamicRegistration = true

# Lifetime of the AS login-session cookie, in seconds.  Subsequent
# /authorize calls from the same browser within this window skip the
# login step.  Default 1800 (30 minutes)
# OAuthSessionTtlSeconds = 1800

# The "kid" embedded in JWT headers and the JWKS.  Default kiss-key-1
# OAuthKeyId = kiss-key-1
